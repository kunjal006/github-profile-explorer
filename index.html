<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Profile Explorer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
    crossorigin="anonymous" 
    referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <button id="theme" aria-label="Change Theme">
            <i class="fa-solid fa-moon" id="theme-icon"></i>
        </button>

        <h1>Github Profile Explorer</h1>

        <form id="searchform">
            <input id="searchbox" placeholder="Enter Github username" type="text" required>
            <button id="searchbtn" type="submit">
                <i class="fa-solid fa-magnifying-glass"></i> Search
            </button>
        </form>

        <div class="loader hidden" id="loader">
            <div class="spinner"></div>
            <p>Fetching profile...</p>
        </div>

        <div class="error-box hidden" id="error-box">
            <i class="fa-solid fa-circle-exclamation"></i>
            <h3 id="error-title">User not found</h3>
            <p id="error-msg">Try searching for a different username.</p>
        </div>

        <div class="profile hidden" id="profile">
            <img id="dp" src="" alt="github dp">
            <div class="profile-body">
                <h2 id="name">Name</h2>
                <h3 id="username">@username</h3>
                <p id="desc">Description</p>
                <div class="profile-meta">
                    <span class="meta-item" id="location-wrap">
                        <i class="fa-solid fa-location-dot"></i>
                        <span id="location-text">—</span>
                    </span>
                    <span class="meta-item" id="blog-wrap">
                        <i class="fa-solid fa-link"></i>
                        <a id="blog" href="#" target="_blank">—</a>
                    </span>
                    <span class="meta-item">
                        <i class="fa-solid fa-calendar-days"></i>
                        <span id="joined">—</span>
                    </span>
                </div>
                <div class="profile-spec">
                    <div class="spec-item">
                        <span id="followers-count">—</span>
                        <label>Followers</label>
                    </div>
                    <div class="spec-divider"></div>
                    <div class="spec-item">
                        <span id="following-count">—</span>
                        <label>Following</label>
                    </div>
                    <div class="spec-divider"></div>
                    <div class="spec-item">
                        <span id="repo-count">—</span>
                        <label>Repos</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="analysis hidden" id="analysis">
            <h2>Profile Analysis</h2>
            <div class="grid">
                <div class="card">
                    <i class="fa-solid fa-book-bookmark"></i>
                    <div class="info">
                        <span class="analysis-value" id="total-repos">—</span>
                        <span class="analysis-label">Total Repositories</span>
                    </div>
                </div>
                <div class="analysis-card">
                    <i class="fa-solid fa-star"></i>
                    <div class="analysis-info">
                        <span class="analysis-value" id="total-stars">—</span>
                        <span class="analysis-label">Total Stars</span>
                    </div>
                </div>
                <div class="analysis-card">
                    <i class="fa-solid fa-code"></i>
                    <div class="analysis-info">
                        <span class="analysis-value" id="top-language">—</span>
                        <span class="analysis-label">Most Used Language</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="repo-detail hidden" id="repo-detail">
            <h2>Repositories</h2>
            <div class="controls">
                <label for="sort">Sort By:</label>
                <select id="sort">
                    <option value="stars">Stars</option>
                    <option value="updated">Latest</option>
                    <option value="name">Name</option>
                </select>
                <label for="filter">Language:</label>
                <select id="filter">
                    <option value="all">All</option>
                    <option value="javascript">JavaScript</option>
                    <option value="typescript">TypeScript</option>
                    <option value="python">Python</option>
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                    <option value="java">Java</option>
                    <option value="c++">C++</option>
                    <option value="go">Go</option>
                    <option value="rust">Rust</option>
                </select>
            </div>
            <div class="repo-container" id="repo-container"></div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
